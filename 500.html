<!DOCTYPE html>
<html lang="id">
<head>
  <title>500 — Server Error | Ultron Bimbel</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700&display=swap" rel="stylesheet"></noscript>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'Nunito',sans-serif;
      background:#0b1730;
      color:#fff;
      min-height:100svh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:32px;
      position:relative;
      overflow:hidden;
    }
    /* Subtle background glow */
    body::before{
      content:'';
      position:fixed;
      top:-200px;left:50%;
      transform:translateX(-50%);
      width:700px;height:500px;
      border-radius:50%;
      background:radial-gradient(ellipse,rgba(168,96,14,.15) 0%,transparent 70%);
      pointer-events:none;
    }
    .code{
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(80px,20vw,160px);
      color:#a8600e;
      line-height:1;
      letter-spacing:6px;
      text-shadow:0 0 60px rgba(168,96,14,.4);
    }
    .icon{font-size:clamp(40px,8vw,72px);margin-bottom:8px;display:block}
    h1{
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(16px,3.5vw,26px);
      letter-spacing:3px;
      text-transform:uppercase;
      margin:12px 0 16px;
      color:rgba(255,255,255,.9);
    }
    p{
      color:rgba(255,255,255,.5);
      font-size:15px;
      max-width:420px;
      line-height:1.7;
      margin-bottom:36px;
    }
    .btn-group{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
    .btn{
      display:inline-block;
      padding:12px 28px;
      font-family:'Nunito',sans-serif;
      font-size:13px;
      font-weight:700;
      letter-spacing:1px;
      text-transform:uppercase;
      text-decoration:none;
      border-radius:10px;
      transition:all .2s;
      cursor:pointer;
      border:none;
    }
    .btn-primary{background:#a8600e;color:#fff}
    .btn-primary:hover{background:#c97c28;transform:translateY(-2px)}
    .btn-outline{background:transparent;color:rgba(255,255,255,.7);border:1.5px solid rgba(255,255,255,.2)}
    .btn-outline:hover{border-color:#a8600e;color:#a8600e;transform:translateY(-2px)}
    .divider{
      width:60px;height:2px;
      background:linear-gradient(90deg,transparent,#a8600e,transparent);
      margin:20px auto;
    }
    .detail{
      font-size:12px;
      color:rgba(255,255,255,.25);
      margin-top:40px;
      font-family:monospace;
    }
    @media(max-width:480px){
      .btn-group{flex-direction:column;align-items:center}
      .btn{width:200px;text-align:center}
    }
  </style>
</head>
<body>
  <span class="icon">🔧</span>
  <div class="code">500</div>
  <div class="divider"></div>
  <h1>Kesalahan Server</h1>
  <p>Terjadi kesalahan internal pada server kami. Tim kami sedang bekerja untuk memperbaikinya. Coba lagi beberapa saat.</p>
  <div class="btn-group">
    <a href="/" class="btn btn-primary">Kembali ke Beranda</a>
        <a onclick="location.reload()" class="btn btn-outline">Coba Lagi</a>
  </div>
  <p class="detail">Error 500 · Internal Server Error</p>
</body>
</html>
