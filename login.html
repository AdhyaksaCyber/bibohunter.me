<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="X-Frame-Options" content="DENY">
<meta name="referrer" content="no-referrer">
<meta name="robots" content="noindex, nofollow">
<title>Login — Ultron Bimbel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<!-- reCAPTCHA v2 -->
<script src="https://www.google.com/recaptcha/api.js" async defer></script>
<style>
:root{
  --bg:#f0f4ff;--bg2:#e6ecf8;--surface:#fff;
  --border:#cdd8ef;--text:#0f1e3c;--muted:#6b7ea8;--muted2:#9aaac8;
  --gold:#b8711e;--gold-l:#d4893a;--gold-pale:#fef3e2;
  --navy:#0d1b35;
  --red:#dc2626;--red-bg:#fef2f2;--red-b:rgba(220,38,38,.22);
  --sh-lg:0 12px 46px rgba(15,30,60,.18);
}
[data-theme="dark"]{
  --bg:#0a1628;--bg2:#0f1e3c;--surface:#162240;
  --border:rgba(200,135,58,.2);--text:#f0f4ff;--muted:#8aa0c0;--muted2:#607090;
  --gold:#d4893a;--gold-pale:rgba(200,135,58,.1);
  --red:#f87171;--red-bg:rgba(220,38,38,.1);--red-b:rgba(248,113,113,.22);
  --sh-lg:0 12px 46px rgba(0,0,0,.55);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Nunito',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:24px;position:relative;overflow:hidden;
  transition:background .3s,color .3s;
  -webkit-font-smoothing:antialiased;
}
body::before,body::after{
  content:'';position:fixed;pointer-events:none;
  border-radius:50%;animation:blob 9s ease-in-out infinite;
}
body::before{
  width:460px;height:460px;top:-180px;left:-120px;
  background:radial-gradient(circle,rgba(184,113,30,.11) 0%,transparent 65%);
}
body::after{
  width:400px;height:400px;bottom:-140px;right:-100px;
  background:radial-gradient(circle,rgba(13,27,53,.09) 0%,transparent 65%);
  animation-direction:reverse;animation-duration:11s;
}
[data-theme="dark"] body::before{background:radial-gradient(circle,rgba(200,135,58,.14) 0%,transparent 65%);}
[data-theme="dark"] body::after{background:radial-gradient(circle,rgba(22,90,180,.11) 0%,transparent 65%);}
@keyframes blob{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-20px) scale(1.03)}}

.lcard{
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:22px;padding:44px 40px;
  width:100%;max-width:420px;
  box-shadow:var(--sh-lg);
  position:relative;z-index:1;
  animation:ci .45s cubic-bezier(.23,1,.32,1) both;
}
@keyframes ci{from{opacity:0;transform:translateY(26px) scale(.97)}to{opacity:1;transform:none}}

.pin-th{
  position:absolute;top:15px;right:15px;
  width:36px;height:36px;
  background:var(--bg2);border:1.5px solid var(--border);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:1rem;transition:all .2s;
  user-select:none;
}
.pin-th:hover{border-color:var(--gold);transform:rotate(22deg);}

.ltop{text-align:center;margin-bottom:28px;}
.lbrand{font-family:'Bebas Neue',sans-serif;font-size:1.95rem;letter-spacing:2px;color:var(--navy);line-height:1;}
[data-theme="dark"] .lbrand{color:var(--gold);}
.lsub-brand{font-size:.7rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-top:3px;margin-bottom:18px;}
.ltitle{font-size:1.15rem;font-weight:900;margin-bottom:4px;}
.lsub{font-size:.83rem;color:var(--muted);}

.fld{margin-bottom:15px;}
.fld label{display:block;font-size:.76rem;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:6px;}
.fw{position:relative;}
.fw input{
  width:100%;padding:11px 42px 11px 40px;
  background:var(--bg2);border:1.5px solid var(--border);
  border-radius:9px;font-family:'Nunito',sans-serif;
  font-size:.93rem;font-weight:600;color:var(--text);
  outline:none;transition:border-color .2s,box-shadow .2s,background .3s;
}
.fw input:focus{
  border-color:var(--gold);
  box-shadow:0 0 0 3px rgba(184,113,30,.13);
  background:var(--surface);
}
.fil{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:.95rem;pointer-events:none;opacity:.4;}
.fir{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:.88rem;color:var(--muted);padding:3px;transition:color .2s;}
.fir:hover{color:var(--gold);}

/* attempt dots */
.dots-row{display:flex;align-items:center;gap:5px;margin-bottom:13px;}
.adot{width:7px;height:7px;border-radius:50%;background:var(--border);transition:background .3s;}
.adot.used{background:var(--red);}
.adot-lbl{font-size:.72rem;color:var(--muted2);font-weight:700;margin-left:4px;}

/* alerts */
.aerr{
  display:none;border-radius:9px;
  padding:10px 13px;font-size:.84rem;font-weight:700;
  margin-bottom:13px;align-items:center;gap:7px;
  background:var(--red-bg);border:1px solid var(--red-b);color:var(--red);
  animation:shk .4s ease;
}
.aerr.show{display:flex;}
.alock{
  display:none;background:var(--red-bg);border:1px solid var(--red-b);color:var(--red);
  border-radius:9px;padding:11px;font-size:.84rem;font-weight:700;
  margin-bottom:13px;text-align:center;
}
.alock.show{display:block;}
#lockT{font-family:'Bebas Neue',sans-serif;font-size:1.05rem;}
@keyframes shk{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-8px)}40%{transform:translateX(8px)}
  60%{transform:translateX(-5px)}80%{transform:translateX(5px)}
}

/* reCAPTCHA wrapper */
.captcha-wrap{
  display:flex;justify-content:center;
  margin-bottom:14px;
  min-height:78px;
}
.captcha-wrap.hidden{display:none;}

.btnlogin{
  width:100%;padding:12px;
  background:linear-gradient(135deg,var(--gold),var(--gold-l));
  color:#fff;font-family:'Nunito',sans-serif;
  font-size:.96rem;font-weight:900;
  border:none;border-radius:9px;cursor:pointer;
  transition:all .25s;
  box-shadow:0 5px 18px rgba(184,113,30,.32);
  letter-spacing:.4px;
}
.btnlogin:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 10px 26px rgba(184,113,30,.48);}
.btnlogin:disabled{opacity:.45;cursor:not-allowed;transform:none;}
.sp{
  display:none;width:17px;height:17px;
  border:2px solid rgba(255,255,255,.35);border-top-color:#fff;
  border-radius:50%;animation:rot .7s linear infinite;margin:0 auto;
}
.btnlogin.ld .btxt{display:none;}
.btnlogin.ld .sp{display:block;}
@keyframes rot{to{transform:rotate(360deg)}}

.back-link{display:block;text-align:center;margin-top:16px;font-size:.8rem;color:var(--muted);text-decoration:none;transition:color .2s;}
.back-link:hover{color:var(--gold);}

/* session msg */
.sess-msg{
  display:none;background:var(--gold-pale);border:1px solid rgba(184,113,30,.32);color:var(--gold);
  border-radius:9px;padding:10px 13px;font-size:.84rem;font-weight:700;
  margin-bottom:13px;text-align:center;
}
.sess-msg.show{display:block;}

/* security notice */
.sec-notice{
  margin-top:18px;
  padding:10px 13px;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:9px;font-size:.73rem;color:var(--muted2);
  text-align:center;line-height:1.5;
}
</style>
</head>
<body>

<div class="lcard">
  <div class="pin-th" id="pinTh" onclick="toggleTheme()">☀️</div>

  <div class="ltop">
    <div class="lbrand">Ultron Bimbel</div>
    <div class="lsub-brand">Admin Panel</div>
    <div class="ltitle">Selamat datang</div>
    <div class="lsub">Masuk untuk mengelola platform</div>
  </div>

  <!-- session expired message -->
  <div class="sess-msg" id="sessMsg"></div>

  <div class="aerr" id="aerr"><span id="aerrT">Username atau password salah.</span></div>
  <div class="alock" id="alock">Terlalu banyak percobaan. Tunggu <span id="lockT">--</span> detik.</div>

  <div class="dots-row" id="dotsRow">
    <div class="adot" id="d0"></div>
    <div class="adot" id="d1"></div>
    <div class="adot" id="d2"></div>
    <div class="adot" id="d3"></div>
    <div class="adot" id="d4"></div>
    <span class="adot-lbl">Percobaan tersisa</span>
  </div>

  <div class="fld">
    <label>Username</label>
    <div class="fw">
      <span class="fil">◈</span>
      <input type="text" id="lu" placeholder="Username" autocomplete="username" maxlength="50" spellcheck="false">
    </div>
  </div>
  <div class="fld">
    <label>Password</label>
    <div class="fw">
      <span class="fil">◉</span>
      <input type="password" id="lp" placeholder="Password" autocomplete="current-password" maxlength="100">
      <button class="fir" type="button" onclick="togglePw()" tabindex="-1" id="eyeBtn">&#128065;</button>
    </div>
  </div>

  <!-- reCAPTCHA (shown after 2 fails) -->
  <div class="captcha-wrap hidden" id="captchaWrap">
    <div class="g-recaptcha"
         data-sitekey="6LeMGugsAAAAAN1nNQwuhw0514kltqYC41K8qID2"
         data-theme="light"
         id="rcWidget">
    </div>
  </div>

  <button class="btnlogin" id="loginBtn" onclick="doLogin()">
    <span class="btxt">Masuk</span>
    <div class="sp"></div>
  </button>

  <a href="/" class="back-link">← Kembali ke halaman utama</a>

  <div class="sec-notice">
    🔒 Koneksi aman. Sesi akan berakhir otomatis setelah 30 menit tidak aktif.
  </div>
</div>

<script>
/* ── XSS escape ── */
function esc(s){const d=document.createElement('div');d.appendChild(document.createTextNode(String(s)));return d.innerHTML;}

/* ── SHA-256 ── */
async function sha256(s){
  const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
  return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');
}

/* ── CREDENTIALS (hash only, never plaintext) ──
   Generate hash baru di browser console:
   crypto.subtle.digest('SHA-256',new TextEncoder().encode('PasswordKamu!')).then(b=>console.log([...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('')))
*/
const CREDS=[
  {username:'admin',    hash:'c6ba8a2b7c9e4f1d3a0e5b8c2d7f4a1e6b9c3d8f2a5e0b4c7d1f6a3e8b2c5d9'},
  {username:'superadmin',hash:'a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2'},
];

const MAX_FAIL=5, CAPTCHA_AFTER=2, LOCK_SEC=60;
let fails=0, lockUntil=0, lockIv=null;
let captchaVisible=false;

/* ── reCAPTCHA theme sync ── */
function syncCaptchaTheme(){
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  const w=document.getElementById('rcWidget');
  if(w&&typeof grecaptcha!=='undefined'&&captchaVisible){
    // Reset widget with correct theme
    try{
      grecaptcha.reset();
      w.setAttribute('data-theme',isDark?'dark':'light');
    }catch(e){}
  } else if(w){
    w.setAttribute('data-theme',isDark?'dark':'light');
  }
}

/* ── THEME ── */
const th=localStorage.getItem('ub_th')||'light';
document.documentElement.setAttribute('data-theme',th);
function syncIcon(){
  document.getElementById('pinTh').textContent=
    document.documentElement.getAttribute('data-theme')==='light'?'☀️':'🌙';
}
syncIcon();
function toggleTheme(){
  const t=document.documentElement.getAttribute('data-theme')==='light'?'dark':'light';
  document.documentElement.setAttribute('data-theme',t);
  localStorage.setItem('ub_th',t);
  syncIcon();
  syncCaptchaTheme();
}

/* ── UI helpers ── */
function togglePw(){
  const el=document.getElementById('lp');
  const btn=document.getElementById('eyeBtn');
  el.type=el.type==='password'?'text':'password';
  btn.innerHTML=el.type==='password'?'&#128065;':'&#128584;';
}
function showErr(msg){
  document.getElementById('aerrT').textContent=msg;
  const el=document.getElementById('aerr');
  el.classList.remove('show');void el.offsetWidth;el.classList.add('show');
}
function updDots(){
  for(let i=0;i<MAX_FAIL;i++){
    document.getElementById('d'+i).classList.toggle('used',i<fails);
  }
}
function showCaptcha(){
  if(captchaVisible)return;
  captchaVisible=true;
  document.getElementById('captchaWrap').classList.remove('hidden');
  syncCaptchaTheme();
}

/* ── LOCKOUT ── */
function startLock(){
  document.getElementById('loginBtn').disabled=true;
  document.getElementById('alock').classList.add('show');
  document.getElementById('aerr').classList.remove('show');
  lockIv=setInterval(()=>{
    const r=Math.ceil((lockUntil-Date.now())/1000);
    document.getElementById('lockT').textContent=r;
    if(r<=0){
      clearInterval(lockIv);lockUntil=0;fails=0;updDots();
      document.getElementById('loginBtn').disabled=false;
      document.getElementById('alock').classList.remove('show');
      // Reset captcha on unlock
      if(captchaVisible){try{grecaptcha.reset();}catch(e){}}
    }
  },500);
}

/* ── LOGIN ── */
async function doLogin(){
  if(lockUntil&&Date.now()<lockUntil)return;
  const u=document.getElementById('lu').value.trim();
  const p=document.getElementById('lp').value;
  if(!u||!p){showErr('Username dan password wajib diisi.');return;}
  if(u.length>50||p.length>100){showErr('Input terlalu panjang.');return;}

  // Validate reCAPTCHA if visible
  if(captchaVisible){
    let token='';
    try{token=grecaptcha.getResponse();}catch(e){}
    if(!token){showErr('Selesaikan verifikasi CAPTCHA terlebih dahulu.');return;}
  }

  const btn=document.getElementById('loginBtn');
  btn.disabled=true;btn.classList.add('ld');

  // Anti-timing-attack delay
  await new Promise(r=>setTimeout(r,500+Math.random()*350));

  const hash=await sha256(p);
  const acc=CREDS.find(a=>a.username===u&&a.hash===hash);
  btn.classList.remove('ld');

  if(acc){
    const token={
      user:acc.username,
      exp:Date.now()+(30*60*1000),
      ts:Date.now(),
      // UUID-style session ID for tracking
      sid:crypto.randomUUID?crypto.randomUUID():Math.random().toString(36).slice(2)
    };
    sessionStorage.setItem('ub_tok',btoa(JSON.stringify(token)));
    sessionStorage.setItem('ub_theme',document.documentElement.getAttribute('data-theme'));
    window.location.replace('/admin.html');
  } else {
    fails++;updDots();
    if(fails>=CAPTCHA_AFTER)showCaptcha();
    if(fails>=MAX_FAIL){
      lockUntil=Date.now()+LOCK_SEC*1000;
      startLock();
    } else {
      btn.disabled=false;
      if(captchaVisible){try{grecaptcha.reset();}catch(e){}}
      showErr('Username atau password salah. '+(MAX_FAIL-fails)+' percobaan tersisa.');
    }
  }
}

/* ── Enter key ── */
document.addEventListener('keydown',e=>{
  if(e.key==='Enter')doLogin();
});

/* ── Session expired message ── */
(function(){
  const msg=sessionStorage.getItem('ub_msg');
  if(msg){
    const el=document.getElementById('sessMsg');
    el.textContent=msg;
    el.classList.add('show');
    sessionStorage.removeItem('ub_msg');
  }
})();

/* ── Already logged in? Redirect ── */
(function(){
  try{
    const raw=sessionStorage.getItem('ub_tok');
    if(!raw)return;
    const tok=JSON.parse(atob(raw));
    if(tok&&tok.exp>Date.now()){
      window.location.replace('/admin.html');
    }
  }catch(e){sessionStorage.removeItem('ub_tok');}
})();
</script>
</body>
</html>
