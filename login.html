<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Ultron Bimbel</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    :root {
      --c-bg: #faf7f2;
      --c-white: #ffffff;
      --c-gold: #a8600e;
      --c-gold2: #c97c28;
      --c-gold-pale: #fdf0dc;
      --c-navy: #0b1730;
      --c-navy2: #152044;
      --c-ink: #111827;
      --c-muted: #6b7a94;
      --c-border: #e6ddd0;
      --c-error: #dc2626;
      --c-error-bg: #fef2f2;
      --c-green: #16a34a;
      --c-green-bg: #f0fdf4;
      --r-lg: 20px;
      --shadow: 0 4px 20px rgba(0, 0, 0, .08);
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--c-bg);
      color: var(--c-ink);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      width: 100%;
      max-width: 440px;
      padding: 28px;
    }

    .login-card {
      background: var(--c-white);
      border: 1px solid var(--c-border);
      border-radius: var(--r-lg);
      padding: 48px 40px;
      box-shadow: var(--shadow);
    }

    .login-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .login-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 2px;
      color: var(--c-navy);
      margin-bottom: 8px;
    }

    .login-subtitle {
      font-size: .875rem;
      color: var(--c-muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 600;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: .875rem;
      font-weight: 700;
      color: var(--c-ink);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: .8px;
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--c-border);
      border-radius: 10px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: .9375rem;
      color: var(--c-ink);
      transition: border-color .2s, box-shadow .2s;
      background: var(--c-bg);
    }

    .form-input:focus {
      outline: none;
      border-color: var(--c-gold);
      box-shadow: 0 0 0 3px rgba(168, 96, 14, .1);
    }

    .form-input::placeholder {
      color: var(--c-muted);
    }

    .form-input.error {
      border-color: var(--c-error);
      background: var(--c-error-bg);
    }

    .error-message {
      display: none;
      color: var(--c-error);
      font-size: .8rem;
      margin-top: 6px;
      font-weight: 600;
    }

    .error-message.show {
      display: block;
    }

    .form-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      font-size: .85rem;
    }

    .form-actions a {
      color: var(--c-gold);
      text-decoration: none;
      font-weight: 600;
      transition: color .2s;
    }

    .form-actions a:hover {
      color: var(--c-gold2);
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--c-muted);
      font-size: .85rem;
      font-weight: 500;
    }

    .remember-me input {
      cursor: pointer;
    }

    .recaptcha-container {
      margin: 20px 0;
      display: flex;
      justify-content: center;
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--c-gold);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: .9375rem;
      font-weight: 700;
      letter-spacing: .5px;
      cursor: pointer;
      transition: background .2s, transform .2s;
      text-transform: uppercase;
    }

    .btn-login:hover:not(:disabled) {
      background: var(--c-gold2);
      transform: translateY(-2px);
    }

    .btn-login:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    .btn-login.loading {
      position: relative;
      color: transparent;
    }

    .btn-login.loading::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      top: 50%;
      left: 50%;
      margin-left: -8px;
      margin-top: -8px;
      border: 2px solid rgba(255, 255, 255, .3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin .8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .alert {
      padding: 14px 16px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: .875rem;
      display: none;
    }

    .alert.show {
      display: block;
    }

    .alert.error {
      background: var(--c-error-bg);
      color: var(--c-error);
      border: 1px solid rgba(220, 38, 38, .2);
    }

    .alert.success {
      background: var(--c-green-bg);
      color: var(--c-green);
      border: 1px solid rgba(22, 163, 74, .2);
    }

    .attempt-counter {
      font-size: .75rem;
      color: var(--c-muted);
      text-align: center;
      margin-top: 12px;
      display: none;
    }

    .attempt-counter.show {
      display: block;
    }

    @media (max-width: 640px) {
      .login-container {
        padding: 20px;
      }

      .login-card {
        padding: 32px 24px;
      }

      .login-header {
        margin-bottom: 28px;
      }

      .login-logo {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>

<div class="login-container">
  <div class="login-card">

    <div class="login-header">
      <div class="login-logo">ULTRON</div>
      <div class="login-subtitle">ADMIN PANEL</div>
    </div>

    <div class="alert error" id="errorAlert"></div>
    <div class="alert success" id="successAlert"></div>

    <form id="loginForm">

      <div class="form-group">
        <label class="form-label">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          class="form-input"
          placeholder="Masukkan email"
          autocomplete="email"
          required
        >
        <div class="error-message" id="emailError"></div>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          class="form-input"
          placeholder="Masukkan password"
          autocomplete="current-password"
          required
        >
        <div class="error-message" id="passwordError"></div>
      </div>

      <div class="form-actions">
        <label class="remember-me">
          <input type="checkbox" id="rememberMe" name="rememberMe">
          <span>Ingat saya</span>
        </label>
        <a href="#forgot">Lupa password?</a>
      </div>

      <div class="recaptcha-container">
        <div class="g-recaptcha" data-sitekey="6LfW2e0sAAAAAJz3QU6fZCgigGFVha-Cb5jUue_3"></div>
      </div>

      <button type="submit" class="btn-login" id="submitBtn">Masuk</button>

      <div class="attempt-counter" id="attemptCounter">
        Percobaan tersisa: <span id="remainingAttempts">5</span>
      </div>

    </form>

  </div>
</div>

<script>
  const API_URL = window.location.origin + '/api';

  const form = document.getElementById('loginForm');
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const submitBtn = document.getElementById('submitBtn');
  const errorAlert = document.getElementById('errorAlert');
  const successAlert = document.getElementById('successAlert');
  const attemptCounter = document.getElementById('attemptCounter');
  const remainingAttemptsSpan = document.getElementById('remainingAttempts');

  let loginAttempts = 0;
  const MAX_ATTEMPTS = 5;
  const LOCKOUT_TIME = 60000;

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = emailInput.value.trim();
    const password = passwordInput.value;

    clearErrors();
    clearAlerts();

    if (!email || !password) {
      showError(emailInput, 'Email dan password diperlukan');
      return;
    }

    const recaptchaToken = grecaptcha.getResponse();
    if (!recaptchaToken) {
      showAlert('Silakan selesaikan reCAPTCHA', 'error');
      return;
    }

    if (loginAttempts >= MAX_ATTEMPTS) {
      showAlert('Terlalu banyak percobaan gagal. Silakan coba lagi dalam 1 menit.', 'error');
      disableForm(true);
      setTimeout(() => {
        loginAttempts = 0;
        disableForm(false);
        attemptCounter.classList.remove('show');
      }, LOCKOUT_TIME);
      return;
    }

    submitBtn.disabled = true;
    submitBtn.classList.add('loading');

    try {
      const response = await fetch(`${API_URL}/auth/login`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ email, password, recaptchaToken })
      });

      const data = await response.json();

      if (!response.ok) {
        loginAttempts++;
        const remaining = MAX_ATTEMPTS - loginAttempts;

        if (remaining > 0) {
          attemptCounter.classList.add('show');
          remainingAttemptsSpan.textContent = remaining;
        }

        showAlert(data.error || 'Login gagal', 'error');
        grecaptcha.reset();
        return;
      }

      loginAttempts = 0;
      showAlert('Login berhasil. Mengalihkan...', 'success');

      localStorage.setItem('accessToken', data.accessToken);
      if (data.refreshToken) {
        localStorage.setItem('refreshToken', data.refreshToken);
      }

      setTimeout(() => {
        window.location.href = '/dashboard';
      }, 1000);

    } catch (error) {
      console.error('Login error:', error);
      showAlert('Terjadi kesalahan. Silakan coba lagi.', 'error');
      grecaptcha.reset();
    } finally {
      submitBtn.disabled = false;
      submitBtn.classList.remove('loading');
    }
  });

  function showError(input, message) {
    input.classList.add('error');
    const errorEl = input.nextElementSibling;
    if (errorEl && errorEl.classList.contains('error-message')) {
      errorEl.textContent = message;
      errorEl.classList.add('show');
    }
  }

  function clearErrors() {
    document.querySelectorAll('.form-input').forEach(input => {
      input.classList.remove('error');
    });
    document.querySelectorAll('.error-message').forEach(msg => {
      msg.classList.remove('show');
      msg.textContent = '';
    });
  }

  function showAlert(message, type) {
    const alert = type === 'error' ? errorAlert : successAlert;
    alert.textContent = message;
    alert.classList.add('show');
  }

  function clearAlerts() {
    errorAlert.classList.remove('show');
    successAlert.classList.remove('show');
  }

  function disableForm(disabled) {
    emailInput.disabled = disabled;
    passwordInput.disabled = disabled;
    submitBtn.disabled = disabled;
  }

  emailInput.addEventListener('input', clearErrors);
  passwordInput.addEventListener('input', clearErrors);

  window.addEventListener('load', () => {
    const rememberedEmail = localStorage.getItem('rememberedEmail');
    if (rememberedEmail) {
      emailInput.value = rememberedEmail;
      document.getElementById('rememberMe').checked = true;
    }
  });

  form.addEventListener('submit', () => {
    const rememberMe = document.getElementById('rememberMe').checked;
    if (rememberMe) {
      localStorage.setItem('rememberedEmail', emailInput.value);
    } else {
      localStorage.removeItem('rememberedEmail');
    }
  });
</script>

</body>
</html>
