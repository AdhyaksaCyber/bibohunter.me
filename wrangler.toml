name = "bibohunter"

main = "dist/worker.js"

compatibility_date = "2024-01-01"

compatibility_flags = ["nodejs_compat"]

account_id = "eff59edef4a07d839795fa83e22d2eac"

[build]

command = "npm run build:frontend && npm run build:worker"

cwd = "."

watch_dir = ["src/worker", "src/utils", "src/worker/routes"]

[site]

bucket = "dist/public"

[vars]

ENVIRONMENT = "development"

API_URL = "https://bibohunter.bagusiqbal18.workers.dev"

FRONTEND_URL = "http://localhost:5173"

JWT_EXPIRES_IN = "900"

REFRESH_TOKEN_EXPIRES = "604800"

MAX_LOGIN_ATTEMPT = "5"

LOCK_DURATION_SEC = "60"

MAX_UPLOAD_SIZE = "52428800"

RATE_LIMIT_WINDOW = "900"

RATE_LIMIT_MAX = "100"

PASSWORD_MIN_LENGTH = "8"

[[d1_databases]]

binding = "DB"

database_name = "ultron-bimbel-dev"

database_id = "6a6e5d92-167f-4abe-8443-17e7cf0df3ea"

[[r2_buckets]]

binding = "R2"

bucket_name = "ultron-bimbel-dev"

# ============================================

# PRODUCTION ENVIRONMENT

# ============================================

[env.production]

name = "bibohunter"

workers_dev = false

routes = [

  { pattern = "bibohunter.me/*", zone_name = "bibohunter.me" }

]

[env.production.vars]

ENVIRONMENT = "production"

API_URL = "https://bibohunter.me"

FRONTEND_URL = "https://bibohunter.me"

JWT_EXPIRES_IN = "900"

REFRESH_TOKEN_EXPIRES = "604800"

MAX_LOGIN_ATTEMPT = "5"

LOCK_DURATION_SEC = "60"

MAX_UPLOAD_SIZE = "52428800"

RATE_LIMIT_WINDOW = "900"

RATE_LIMIT_MAX = "100"

PASSWORD_MIN_LENGTH = "8"

[[env.production.d1_databases]]

binding = "DB"

database_name = "ultron-db"

database_id = "6a6e5d92-167f-4abe-8443-17e7cf0df3ea"

[[env.production.r2_buckets]]

binding = "R2"

bucket_name = "ultron-bimbel-production"

# ============================================

# STAGING ENVIRONMENT

# ============================================

[env.staging]

name = "ultron-bimbel-staging"

workers_dev = true

[env.staging.vars]

ENVIRONMENT = "staging"

API_URL = "https://ultron-bimbel-staging.bagusiqbal18.workers.dev"

FRONTEND_URL = "https://ultron-bimbel-staging.bagusiqbal18.workers.dev"

JWT_EXPIRES_IN = "900"

REFRESH_TOKEN_EXPIRES = "604800"

MAX_LOGIN_ATTEMPT = "5"

LOCK_DURATION_SEC = "60"

MAX_UPLOAD_SIZE = "52428800"

RATE_LIMIT_WINDOW = "900"

RATE_LIMIT_MAX = "100"

PASSWORD_MIN_LENGTH = "8"

[[env.staging.d1_databases]]

binding = "DB"

database_name = "ultron-bimbel-staging"

database_id = "6a6e5d92-167f-4abe-8443-17e7cf0df3ea"

[[env.staging.r2_buckets]]

binding = "R2"

bucket_name = "ultron-bimbel-staging"
